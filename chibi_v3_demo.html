<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .demo-container { text-align: center; color: #fff; font-family: sans-serif; }
        .chibi-v3 { width: 300px; height: 300px; }
    </style>
</head>
<body>
    <div class="demo-container">
        <h2>Premium Chibi V3 Prototype</h2>
        <p>Advanced SVG: Gradients, Glow & Detailed Paths</p>
        <div class="chibi-v3">
            <svg viewBox="-50 -50 300 300" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Skin Gradient -->
                    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffe0bd" />
                        <stop offset="100%" stop-color="#ffcd94" />
                    </linearGradient>
                    <!-- Cyber Hair Gradient -->
                    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f3ff" />
                        <stop offset="100%" stop-color="#3b82f6" />
                    </linearGradient>
                    <!-- Glow Filter -->
                    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>

                <!-- Back Wing (Glow) -->
                <g filter="url(#neonGlow)">
                    <path d="M 100 110 C 20 60 -50 160 50 190 Q 70 195 100 130" fill="rgba(0, 243, 255, 0.3)" stroke="#00f3ff" stroke-width="2" />
                    <path d="M 100 110 C 180 60 250 160 150 190 Q 130 195 100 130" fill="rgba(0, 243, 255, 0.3)" stroke="#00f3ff" stroke-width="2" />
                </g>

                <!-- Body (Male - Stronger shoulders) -->
                <g stroke="#1e1b4b" stroke-width="2.5" stroke-linejoin="round">
                    <!-- Legs -->
                    <path d="M 85 145 Q 82 175 80 185 C 80 190 90 190 92 185 L 95 145 Z" fill="url(#skinGrad)" />
                    <path d="M 115 145 Q 118 175 120 185 C 120 190 110 190 108 185 L 105 145 Z" fill="url(#skinGrad)" />
                    <!-- Torso -->
                    <path d="M 82 110 Q 100 105 118 110 L 122 145 Q 100 150 78 145 Z" fill="#1e2937" /> <!-- Cyber Suit -->
                    <!-- Arms -->
                    <path d="M 82 115 Q 60 130 60 150" fill="none" stroke="url(#skinGrad)" stroke-width="8" stroke-linecap="round" />
                    <path d="M 118 115 Q 140 130 140 150" fill="none" stroke="url(#skinGrad)" stroke-width="8" stroke-linecap="round" />
                </g>

                <!-- Head -->
                <g transform="translate(0, -10)">
                    <ellipse cx="100" cy="80" rx="42" ry="38" fill="url(#skinGrad)" stroke="#1e1b4b" stroke-width="2.5" />
                    <!-- Eyes (Detailed Anime Style) -->
                    <g transform="translate(80, 80)">
                        <path d="M -15 -5 Q -10 -15 5 -10 Q 10 0 0 5 Q -10 5 -15 -5" fill="#fff" stroke="#000" stroke-width="1" />
                        <circle cx="0" cy="0" r="4" fill="#000" />
                        <circle cx="2" cy="-2" r="1.5" fill="#fff" />
                    </g>
                    <g transform="translate(120, 80) scale(-1, 1)">
                        <path d="M -15 -5 Q -10 -15 5 -10 Q 10 0 0 5 Q -10 5 -15 -5" fill="#fff" stroke="#000" stroke-width="1" />
                        <circle cx="0" cy="0" r="4" fill="#000" />
                        <circle cx="2" cy="-2" r="1.5" fill="#fff" />
                    </g>
                    <!-- Hair (Detailed Path) -->
                    <path d="M 55 85 Q 50 40 100 35 Q 150 40 145 85 L 140 70 Q 100 60 60 70 Z" fill="url(#hairGrad)" stroke="#1e1b4b" stroke-width="1.5" />
                    <path d="M 70 70 L 60 30 L 85 60 L 100 20 L 115 60 L 140 30 L 130 70" fill="url(#hairGrad)" stroke="#fff" stroke-width="1" opacity="0.4" />
                </g>

                <!-- Weapon (Holding) -->
                <g filter="url(#neonGlow)" transform="translate(140, 150) rotate(-20)">
                    <rect x="0" y="0" width="4" height="80" rx="2" fill="#475569" />
                    <path d="M -5 0 Q 30 -40 10 0 Z" fill="#00f3ff" transform="translate(2, -10)" />
                    <path d="M -5 0 L 15 -60 L 25 -50 L 5 10 Z" fill="rgba(0, 243, 255, 0.8)" stroke="#fff" stroke-width="1" />
                </g>
            </svg>
        </div>
    </div>
</body>
</html>
