<!DOCTYPE html>
<html>
<head>
    <title>Chibi V11 High-Fidelity Test</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .container { width: 400px; height: 480px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h1>CHIBI V11 ART ENGINE</h1>
    <div class="container" id="chibi-container"></div>

    <script src="js/chibi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = {
                skinColor: "#ffd1a9",
                hairColor: "#ec4899",
                hairStyle: 1, // Spiky
                eyeStyle: 0,
                topColor: "#ffffff",
                bottomColor: "#1e293b"
            };
            const svg = ChibiModule.render(config, true);
            document.getElementById('chibi-container').innerHTML = svg;
        });
    </script>
</body>
</html>
