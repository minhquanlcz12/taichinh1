<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            color: #fff; font-family: 'Inter', sans-serif;
        }
        .demo { text-align: center; }
        h2 { font-weight: 800; text-shadow: 0 0 20px rgba(0,243,255,0.5); margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 15px; }
        .stage { display: flex; gap: 60px; justify-content: center; align-items: flex-end; }
        .chibi-card { text-align: center; }
        .chibi-card span { display: block; margin-top: 8px; font-size: 12px; color: #94a3b8; font-weight: 600; }
        svg.chibi { filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        /* Animations */
        @keyframes breathe { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes armSwing { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-12deg); } }
        @keyframes armSwingR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(12deg); } }
        @keyframes runeRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes runeRotateRev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes glowPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes fireDance { 0%,100% { transform: scaleY(1) translateY(0); } 50% { transform: scaleY(1.15) translateY(-2px); } }
        .breathe { animation: breathe 3s ease-in-out infinite; }
        .arm-l { transform-origin: 88px 116px; animation: armSwing 2.5s ease-in-out infinite; }
        .arm-r { transform-origin: 112px 116px; animation: armSwingR 2.5s ease-in-out infinite; }
    </style>
</head>
