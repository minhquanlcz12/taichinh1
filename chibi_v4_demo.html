<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        .demo-container { 
            position: relative;
            text-align: center; 
        }
        h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,243,255,0.5); }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }

        .chibi-stage { 
            position: relative;
            width: 420px; 
            height: 480px; 
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === MAGIC CIRCLE === */
        .magic-circle-container {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 120px; /* Perspective squished */
            z-index: 0;
            pointer-events: none;
        }
        .magic-circle-container svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 25px rgba(0, 200, 255, 0.7));
        }
        .mc-rotate {
            transform-origin: center;
            animation: mcSpin 12s linear infinite;
        }
        .mc-rotate-rev {
            transform-origin: center;
            animation: mcSpin 20s linear infinite reverse;
        }
        .mc-pulse {
            animation: mcPulse 3s ease-in-out infinite;
        }
        @keyframes mcSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes mcPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* === CHARACTER === */
        .character-img {
            position: absolute;
            width: 300px;
            height: 380px;
            z-index: 2;
            object-fit: contain;
            bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5));
        }

        /* === WEAPON === */
        .weapon-layer {
            position: absolute;
            z-index: 3;
            width: 140px;
            height: 140px;
            bottom: 80px;
            right: 30px;
            filter: drop-shadow(0 0 18px #f43f5e);
            animation: weaponFloat 3s infinite ease-in-out;
        }
        @keyframes weaponFloat {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(-8px) rotate(-10deg); }
        }

        /* === AMBIENT PARTICLES === */
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #00f3ff;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            filter: blur(1px);
        }
        .p1 { left: 20%; bottom: 30%; animation: float 4s ease-in-out infinite; }
        .p2 { left: 70%; bottom: 50%; animation: float 5s ease-in-out infinite 1s; }
        .p3 { left: 40%; bottom: 20%; animation: float 3.5s ease-in-out infinite 0.5s; }
        .p4 { left: 80%; bottom: 40%; animation: float 4.5s ease-in-out infinite 2s; }
        .p5 { left: 15%; bottom: 55%; animation: float 6s ease-in-out infinite 1.5s; }
        .p6 { left: 55%; bottom: 65%; animation: float 3s ease-in-out infinite 0.8s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 1; }
        }

        /* === GROUND GLOW === */
        .ground-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(0, 200, 255, 0.25) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h2>🔮 PREMIUM CHIBI V4 + MAGIC CIRCLE</h2>
        <p>HD Character + Animated Rune Circle + VFX</p>
        
        <div class="chibi-stage">
            <!-- Ground Glow -->
            <div class="ground-glow"></div>

            <!-- ====== MAGIC CIRCLE (Rune Circle Under Feet) ====== -->
            <div class="magic-circle-container">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="runeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f3ff" />
                            <stop offset="50%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#8b5cf6" />
                        </linearGradient>
                        <linearGradient id="runeGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#a855f7" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                        <filter id="runeGlow">
                            <feGaussianBlur stdDeviation="2" result="b" />
                            <feComposite in="SourceGraphic" in2="b" operator="over" />
                        </filter>
                    </defs>

                    <!-- Outer Ring (Slow spin) -->
                    <g class="mc-rotate mc-pulse" filter="url(#runeGlow)">
                        <circle cx="100" cy="100" r="95" fill="none" stroke="url(#runeGrad1)" stroke-width="2.5" stroke-dasharray="12 4" />
                        <circle cx="100" cy="100" r="88" fill="none" stroke="url(#runeGrad1)" stroke-width="1" />
                        <!-- Rune Symbols on outer ring -->
                        <text x="100" y="18" text-anchor="middle" font-size="10" fill="#00f3ff" opacity="0.9">✦</text>
                        <text x="182" y="104" text-anchor="middle" font-size="10" fill="#00f3ff" opacity="0.9">⟐</text>
                        <text x="100" y="195" text-anchor="middle" font-size="10" fill="#00f3ff" opacity="0.9">✧</text>
                        <text x="18" y="104" text-anchor="middle" font-size="10" fill="#00f3ff" opacity="0.9">⟁</text>
                        <!-- Cardinal Lines -->
                        <line x1="100" y1="12" x2="100" y2="30" stroke="#00f3ff" stroke-width="1.5" opacity="0.6" />
                        <line x1="188" y1="100" x2="170" y2="100" stroke="#00f3ff" stroke-width="1.5" opacity="0.6" />
                        <line x1="100" y1="188" x2="100" y2="170" stroke="#00f3ff" stroke-width="1.5" opacity="0.6" />
                        <line x1="12" y1="100" x2="30" y2="100" stroke="#00f3ff" stroke-width="1.5" opacity="0.6" />
                    </g>

                    <!-- Middle Ring (Reverse spin, runes) -->
                    <g class="mc-rotate-rev" filter="url(#runeGlow)">
                        <circle cx="100" cy="100" r="75" fill="none" stroke="url(#runeGrad2)" stroke-width="2" />
                        <circle cx="100" cy="100" r="68" fill="none" stroke="url(#runeGrad2)" stroke-width="0.8" stroke-dasharray="6 8" />
                        <!-- Hexagonal Star -->
                        <polygon points="100,30 115,70 155,70 125,95 135,135 100,110 65,135 75,95 45,70 85,70" 
                                 fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.7" />
                        <!-- Inner cross-hairs -->
                        <line x1="55" y1="55" x2="145" y2="145" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4" />
                        <line x1="145" y1="55" x2="55" y2="145" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4" />
                    </g>

                    <!-- Inner Ring (Fast spin) -->
                    <g class="mc-rotate" style="animation-duration: 6s;" filter="url(#runeGlow)">
                        <circle cx="100" cy="100" r="50" fill="none" stroke="#00f3ff" stroke-width="1.5" stroke-dasharray="3 6" />
                        <!-- Triangle -->
                        <polygon points="100,55 140,130 60,130" fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.8" />
                        <!-- Inverted triangle -->
                        <polygon points="100,145 140,70 60,70" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
                    </g>

                    <!-- Center Core (Pulsing) -->
                    <g class="mc-pulse">
                        <circle cx="100" cy="100" r="12" fill="rgba(0, 243, 255, 0.15)" stroke="#00f3ff" stroke-width="1.5" />
                        <circle cx="100" cy="100" r="5" fill="#00f3ff" opacity="0.8">
                            <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite" />
                            <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite" />
                        </circle>
                    </g>

                    <!-- Sparkle dots on ring -->
                    <circle cx="100" cy="5" r="2" fill="#fff" opacity="0.8">
                        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="195" cy="100" r="2" fill="#fff" opacity="0.8">
                        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s" />
                    </circle>
                    <circle cx="100" cy="195" r="2" fill="#fff" opacity="0.8">
                        <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="1s" />
                    </circle>
                    <circle cx="5" cy="100" r="2" fill="#fff" opacity="0.8">
                        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.3s" />
                    </circle>
                </svg>
            </div>

            <!-- ====== CHARACTER (Single HD Image) ====== -->
            <img class="character-img" 
                 src="C:/Users/Admin/.gemini/antigravity/brain/ad810083-6616-49b7-8bad-36e8ccdd1262/cyber_armor_set_hd_1779790792899.png" 
                 alt="Cyber Warrior" />

            <!-- ====== WEAPON (SVG) ====== -->
            <div class="weapon-layer">
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#f43f5e" />
                            <stop offset="50%" stop-color="#fb7185" />
                            <stop offset="100%" stop-color="#f43f5e" />
                        </linearGradient>
                        <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                            <stop offset="0%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#ef4444" />
                        </linearGradient>
                    </defs>
                    <!-- Blade -->
                    <path d="M 50 5 L 38 85 L 50 95 L 62 85 Z" fill="url(#bladeGrad)" stroke="#fff" stroke-width="0.8" />
                    <!-- Core Glow -->
                    <path d="M 50 10 L 44 80 L 50 88 L 56 80 Z" fill="#fff" opacity="0.35" style="filter: blur(2px);" />
                    <!-- Fire L -->
                    <path d="M 42 25 Q 25 10 38 50 Q 28 40 40 70" fill="none" stroke="url(#fireGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
                        <animate attributeName="d" 
                            values="M 42 25 Q 25 10 38 50 Q 28 40 40 70;M 42 25 Q 20 15 36 55 Q 24 38 42 68;M 42 25 Q 25 10 38 50 Q 28 40 40 70" 
                            dur="0.8s" repeatCount="indefinite" />
                    </path>
                    <!-- Fire R -->
                    <path d="M 58 25 Q 75 10 62 50 Q 72 40 60 70" fill="none" stroke="url(#fireGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
                        <animate attributeName="d" 
                            values="M 58 25 Q 75 10 62 50 Q 72 40 60 70;M 58 25 Q 80 15 64 55 Q 76 38 58 68;M 58 25 Q 75 10 62 50 Q 72 40 60 70" 
                            dur="0.8s" repeatCount="indefinite" />
                    </path>
                    <!-- Hilt Guard -->
                    <rect x="35" y="88" width="30" height="5" rx="2" fill="#475569" stroke="#94a3b8" stroke-width="0.8" />
                    <circle cx="50" cy="90" r="3" fill="#fbbf24" opacity="0.8" />
                    <!-- Handle -->
                    <rect x="46" y="93" width="8" height="18" rx="2" fill="#1e293b" stroke="#64748b" stroke-width="0.8" />
                    <!-- Pommel -->
                    <circle cx="50" cy="114" r="4" fill="#475569" stroke="#94a3b8" stroke-width="0.8" />
                    <circle cx="50" cy="114" r="2" fill="#ef4444" opacity="0.7" />
                </svg>
            </div>

            <!-- Ambient Particles -->
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="particle p6"></div>
        </div>
    </div>
</body>
</html>
